# detekt configuration — overrides layered on top of the default rule set
# (buildUponDefaultConfig = true). Kept lenient for a first rollout; tighten over time.

complexity:
  LongMethod:
    threshold: 80
  TooManyFunctions:
    active: false

style:
  MagicNumber:
    # Protocol/byte-layout code is full of intentional constants.
    active: false
  ReturnCount:
    active: false
  UnusedPrivateMember:
    active: true

naming:
  FunctionNaming:
    # Test methods use snake_case by convention.
    excludes: ['**/test/**', '**/androidTest/**']
